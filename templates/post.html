{% extends "base.html" %}
{% block title %}
<title>學生資料管理系統-新增資料</title>

<style>
    body{
        background-color: #f8f9f5;
        font-family: "Noto Sans TC", sans-serif;
        color: #333;
    }

    h2, h3{
        text-align: center;
        color: #2f5d50;
    }

    a{
        color: #588157;
        text-decoration: none;
    }

    a:hover{
        text-decoration: underline;
    }

    /* 卡片 */
    .card{
        width: 500px;
        margin: 30px auto;
        padding: 25px;
        background: #ffffff;
        border-radius: 12px;
        box-shadow: 0 5px 15px rgba(0,0,0,0.08);
    }

    /* 表格 */
    table{
        width: 100%;
        border-collapse: collapse;
    }

    th{
        text-align: left;
        padding: 10px;
        width: 30%;
        color: #344e41;
    }

    td{
        padding: 10px;
    }

    /* 輸入框 */
    input[type="text"],
    input[type="email"],
    input[type="date"]{
        width: 95%;
        padding: 8px;
        border-radius: 6px;
        border: 1px solid #c8d5b9;
        outline: none;
    }

    input:focus{
        border-color: #6b9080;
    }

    /* radio */
    input[type="radio"]{
        margin-left: 5px;
    }

    /* 按鈕 */
    .btn-group{
        text-align: center;
        margin-top: 15px;
    }

    .btn{
        padding: 8px 16px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        margin: 5px;
        transition: 0.3s;
    }

    .btn-submit{
        background-color: #6b9080;
        color: white;
    }

    .btn-submit:hover{
        background-color: #4f6f63;
    }

    .btn-reset{
        background-color: #dad7cd;
    }

    .btn-reset:hover{
        background-color: #cfcabf;
    }

</style>
{% endblock %}


{% block content %}
<div>
    <h2>🎓 學生資料管理系統 - 新增資料</h2>
    <h3><a href="{% url 'index' %}">🏫 回首頁</a></h3>
</div>

<div class="card">
    <form action="{% url 'post' %}" method="post">
        {% csrf_token %}

        <table>
            <tr>
                <th>*姓名</th>
                <td>
                    <input type="text" name="cname" required placeholder="請輸入姓名">
                </td>
            </tr>

            <tr>
                <th>*性別</th>
                <td>
                    <input type="radio" name="csex" value="M" checked> 男
                    <input type="radio" name="csex" value="F"> 女
                </td>
            </tr>

            <tr>
                <th>*生日</th>
                <td>
                    <input type="date" name="cbirthday" required>
                </td>
            </tr>

            <tr>
                <th>*信箱</th>
                <td>
                    <input type="email" name="cemail" required placeholder="請輸入 Email">
                </td>
            </tr>

            <tr>
                <th>連絡電話</th>
                <td>
                    <input type="text" name="cphone" placeholder="請輸入電話">
                </td>
            </tr>

            <tr>
                <th>地址</th>
                <td>
                    <input type="text" name="caddr" placeholder="請輸入地址">
                </td>
            </tr>
        </table>

        <div class="btn-group">
            <button type="submit" class="btn btn-submit">💾 儲存</button>
            <button type="reset" class="btn btn-reset">♻ 重置</button>
        </div>
    </form>
</div>

{% endblock %}
